<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <link rel="apple-touch-icon" href="/logo.png" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Preconnect to external domains for faster loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

  <!-- Primary Meta Tags -->
  <title>Irtiqa Marketing | Full-Service Creative Marketing Agency</title>
  <meta name="title" content="Irtiqa Marketing | Full-Service Creative Marketing Agency" />
  <meta name="description"
    content="Irtiqa Marketing is a full-service creative marketing agency helping startups, businesses, and enterprises grow through branding, digital marketing, AI solutions, websites, photography, videography, and performance-driven campaigns." />
  <meta name="keywords"
    content="irtiqa marketing, creative marketing agency, branding agency, digital marketing, social media marketing, website development, photography, videography, AI solutions, performance marketing, SEO, graphic design, India" />
  <meta name="author" content="Irtiqa Marketing" />
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
  <link rel="canonical" href="https://hitechglobals.com/" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://hitechglobals.com/" />
  <meta property="og:title" content="Irtiqa Marketing | Full-Service Creative Marketing Agency" />
  <meta property="og:description"
    content="Irtiqa Marketing is a full-service creative marketing agency helping businesses grow through branding, digital marketing, AI solutions, and performance-driven campaigns." />
  <meta property="og:image" content="https://hitechglobals.com/og-image.png" />
  <meta property="og:site_name" content="Irtiqa Marketing" />
  <meta property="og:locale" content="en_US" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://hitechglobals.com/" />
  <meta property="twitter:title" content="Irtiqa Marketing | Full-Service Creative Marketing Agency" />
  <meta property="twitter:description"
    content="Irtiqa Marketing is a full-service creative marketing agency helping businesses grow through branding, digital marketing, AI solutions, and performance-driven campaigns." />
  <meta property="twitter:image" content="https://hitechglobals.com/og-image.png" />

  <!-- Additional SEO -->
  <meta name="theme-color" content="#0B0B0B" />
  <meta name="msapplication-TileColor" content="#0B0B0B" />
  <meta name="geo.region" content="IN" />
  <meta name="geo.placename" content="India" />
  <meta name="apple-mobile-web-app-title" content="Irtiqa Marketing" />
  <meta name="application-name" content="Irtiqa Marketing" />

  <!-- Structured Data - Organization -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Irtiqa Marketing",
      "legalName": "Irtiqa Marketing",
      "alternateName": ["IrtiqaMarketing", "Irtiqa"],
      "url": "https://hitechglobals.com",
      "logo": "https://hitechglobals.com/logo.png",
      "description": "Irtiqa Marketing is a full-service creative marketing agency helping startups, businesses, and enterprises grow through branding, digital marketing, AI solutions, websites, photography, videography, and performance-driven campaigns.",
      "brand": {
        "@type": "Brand",
        "name": "Irtiqa Marketing",
        "alternateName": "Irtiqa"
      },
      "sameAs": [
        "https://www.instagram.com/irtiqamarketing/",
        "https://www.linkedin.com/company/irtiqamarketing/",
        "https://www.facebook.com/irtiqamarketing/",
        "https://www.youtube.com/@irtiqamarketing"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "availableLanguage": ["English", "Hindi", "Urdu"]
      },
      "areaServed": "IN",
      "founder": {
        "@type": "Person",
        "name": "Faqeha Fatima",
        "jobTitle": "Founder & Creative Director"
      }
    }
  </script>

  <!-- Structured Data - WebSite -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Irtiqa Marketing",
      "url": "https://hitechglobals.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://hitechglobals.com/blog?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
  </script>

  <!-- Structured Data - ProfessionalService -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Irtiqa Marketing",
      "image": "https://hitechglobals.com/logo.png",
      "priceRange": "$$",
      "url": "https://hitechglobals.com",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "IN"
      },
      "openingHoursSpecification": {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"],
        "opens": "00:00",
        "closes": "23:59"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Marketing & Creative Services",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Branding & Identity"
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Social Media Marketing"
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Website Development"
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Photography & Videography"
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Performance Marketing"
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "AI Solutions"
            }
          }
        ]
      }
    }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
